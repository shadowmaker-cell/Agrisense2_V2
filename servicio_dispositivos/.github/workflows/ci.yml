name: AgriSense - Device Management CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'servicio_dispositivos/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'servicio_dispositivos/**'

jobs:


  lint:
    name: Lint y formato
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: servicio_dispositivos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - run: black --check .
      - run: flake8 . --max-line-length=120 --exclude=alembic/

  
  tests-unitarios:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: servicio_dispositivos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  tests-integracion:
    name: Tests de integración
    runs-on: ubuntu-latest
    needs: tests-unitarios
    defaults:
      run:
        working-directory: servicio_dispositivos
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dispositivos_db
          POSTGRES_USER: agrisense
          POSTGRES_PASSWORD: agrisense123
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          DATABASE_URL: postgresql://agrisense:agrisense123@localhost:5432/dispositivos_db
        run: |
          alembic upgrade head
          python app/seed.py
          pytest tests/ -v --tb=short


  build-docker:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: tests-integracion
    defaults:
      run:
        working-directory: servicio_dispositivos
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t agrisense-dispositivos:${{ github.sha }} .


  scan-seguridad:
    name: Scan de seguridad Trivy
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagen para escanear
        run: docker build -t agrisense-dispositivos:scan ./servicio_dispositivos
      - name: Ejecutar Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agrisense-dispositivos:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  
  push-y-deploy:
    name: Push a Docker Hub y deploy
    runs-on: ubuntu-latest
    needs: scan-seguridad
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: servicio_dispositivos
    steps:
      - uses: actions/checkout@v4
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push imagen
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/agrisense-dispositivos:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/agrisense-dispositivos:latest
      - name: Deploy en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DISPOSITIVOS }}