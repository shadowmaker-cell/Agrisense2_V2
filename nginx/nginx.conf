worker_processes 1;

events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;

    upstream svc_dispositivos {
        server servicio-dispositivos:8001;
    }
    upstream svc_ingesta {
        server servicio-ingesta:8002;
    }
    upstream svc_procesamiento {
        server servicio-procesamiento:8003;
    }
    upstream svc_notificaciones {
        server servicio-notificaciones:8004;
    }
    upstream svc_parcelas {
        server servicio-parcelas:8005;
    }
    upstream svc_ml {
        server servicio-ml:8006;
    }

    server {
        listen      8000;
        server_name localhost;

        location = /api/salud {
            default_type application/json;
            add_header Cache-Control "no-store";
            return 200 '{"estado":"ok","servicio":"nginx_gateway","version":"1.0"}';
        }

        location /api/dispositivos/ {
            proxy_pass         http://svc_dispositivos/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location /api/ingesta/ {
            proxy_pass         http://svc_ingesta/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location /api/procesamiento/ {
            proxy_pass         http://svc_procesamiento/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location /api/notificaciones/ {
            proxy_pass         http://svc_notificaciones/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location /api/parcelas/ {
            proxy_pass         http://svc_parcelas/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location /api/ml/ {
            proxy_pass         http://svc_ml/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @servicio_no_disponible;
        }

        location / {
            default_type application/json;
            return 200 '{"estado":"ok","mensaje":"AgriSense API Gateway"}';
        }

        location @servicio_no_disponible {
            default_type application/json;
            add_header Cache-Control "no-store";
            return 503 '{"estado":"error","detalle":"Microservicio no disponible temporalmente"}';
        }
    }
}