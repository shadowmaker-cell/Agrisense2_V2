worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8000;

        location /api/auth/ {
            proxy_pass https://agrisense-auth.onrender.com/;
            proxy_set_header Host agrisense-auth.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/dispositivos/ {
            proxy_pass https://agrisense-dispositivos.onrender.com/;
            proxy_set_header Host agrisense-dispositivos.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/ingesta/ {
            proxy_pass https://agrisense-ingesta.onrender.com/;
            proxy_set_header Host agrisense-ingesta.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/procesamiento/ {
            proxy_pass https://agrisense-procesamiento.onrender.com/;
            proxy_set_header Host agrisense-procesamiento.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/notificaciones/ {
            proxy_pass https://agrisense-notificaciones.onrender.com/;
            proxy_set_header Host agrisense-notificaciones.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/parcelas/ {
            proxy_pass https://agrisense-parcelas.onrender.com/;
            proxy_set_header Host agrisense-parcelas.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/ml/ {
            proxy_pass https://agrisense-ml.onrender.com/;
            proxy_set_header Host agrisense-ml.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /api/recomendaciones/ {
            proxy_pass https://agrisense-recomendaciones.onrender.com/;
            proxy_set_header Host agrisense-recomendaciones.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }

        location /health {
            return 200 '{"estado":"ok","servicio":"api-gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }
    }
}