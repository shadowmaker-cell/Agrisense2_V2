    dockerContext: ./servicio_procesamiento
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_IeLUqMfhEb35@ep-frosty-salad-aeeh6eyi-pooler.c-2.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: agrisense_jwt_secret_2026_prod
