services:
  - type: web
    name: agrisense-auth
    runtime: docker
    dockerfilePath: ./servicio_auth/Dockerfile
    dockerContext: ./servicio_auth
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_5BAsWIO1XaYj@ep-flat-shape-aj8qjbrl.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: agrisense_jwt_secret_2026_prod
      - key: REFRESH_SECRET
        value: agrisense_refresh_secret_2026_prod
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_ENV
        value: production

  - type: web
    name: agrisense-dispositivos
