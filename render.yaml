      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_r3VYgcA8RNEu@ep-orange-voice-ajg3v76p-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: agrisense_jwt_secret_2026_prod
      - key: REFRESH_SECRET
        value: agrisense_refresh_secret_2026_prod
      - key: APP_ENV
        value: production
      - key: BROKER_URL
        value: ""

  - type: web
    name: agrisense-ingesta
    runtime: docker
    dockerfilePath: ./servicio_ingesta/Dockerfile
    dockerContext: ./servicio_ingesta
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_GBo1Aagq9lEu@ep-ancient-hat-aejqk0zi-pooler.c-2.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: agrisense_jwt_secret_2026_prod
      - key: REFRESH_SECRET
        value: agrisense_refresh_secret_2026_prod
      - key: DEVICE_SERVICE_URL
        value: https://agrisense-dispositivos.onrender.com
