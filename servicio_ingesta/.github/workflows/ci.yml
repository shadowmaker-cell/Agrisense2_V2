name: IoT Ingestion Service — CI/CD

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - run: black --check app/
      - run: flake8 app/ --max-line-length=100

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: ingesta_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:1234@localhost:5432/ingesta_test_db
      - run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql://postgres:1234@localhost:5432/ingesta_test_db
          JWT_SECRET: test-secret
          REFRESH_SECRET: test-refresh
          DEVICE_SERVICE_URL: http://localhost:8001

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build imagen Docker
        run: docker build -t iot-ingestion:${{ github.sha }} .
      - name: Instalar Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Escanear vulnerabilidades
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL iot-ingestion:${{ github.sha }}
      - name: Login Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push imagen
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag iot-ingestion:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/iot-ingestion:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/iot-ingestion:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy en Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_INGESTA_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"